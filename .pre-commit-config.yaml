repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]

  
  - repo: local
    hooks:
      - id: pytest
        name: Run Unit Tests
        entry: python -m pytest tests/unit
        language: system
        pass_filenames: false